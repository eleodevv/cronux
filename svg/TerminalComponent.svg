<svg width="500" height="350" viewBox="0 0 500 350" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Terminal shadow -->
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
        </filter>
        <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Terminal window with shadow -->
    <rect x="25" y="25" width="450" height="300" rx="12" fill="url(#terminalGradient)" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- Terminal header -->
    <rect x="25" y="25" width="450" height="40" rx="12" fill="url(#headerGradient)"/>
    <rect x="25" y="53" width="450" height="12" fill="url(#headerGradient)"/>
    
    <!-- Terminal controls -->
    <circle cx="45" cy="45" r="6" fill="#ef4444"/>
    <circle cx="65" cy="45" r="6" fill="#f59e0b"/>
    <circle cx="85" cy="45" r="6" fill="#10b981"/>
    
    <!-- Terminal title -->
    <text x="250" y="50" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace" font-weight="500">cronux terminal</text>
    
    <!-- Terminal content area -->
    <rect x="25" y="65" width="450" height="235" fill="#0f172a"/>
    
    <!-- Command examples with proper spacing and professional styling -->
    <!-- cronux new -->
    <text x="40" y="90" fill="#22c55e" font-size="14" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace" font-weight="500">$ cronux new mi-proyecto</text>
    <text x="40" y="108" fill="#64748b" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">✓ Proyecto inicializado</text>
    <text x="40" y="124" fill="#6366f1" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">ID: v1.0</text>
    
    <!-- Separator line -->
    <line x1="40" y1="135" x2="460" y2="135" stroke="#1e293b" stroke-width="1"/>
    
    <!-- cronux save -->
    <text x="40" y="155" fill="#22c55e" font-size="14" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace" font-weight="500">$ cronux save -m "nueva funcionalidad"</text>
    <text x="40" y="173" fill="#64748b" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">Guardando versión...</text>
    <text x="40" y="189" fill="#22c55e" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">✓ Versión guardada</text>
    <text x="40" y="205" fill="#6366f1" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">ID: v1.1</text>
    
    <!-- Separator line -->
    <line x1="40" y1="216" x2="460" y2="216" stroke="#1e293b" stroke-width="1"/>
    
    <!-- cronux log -->
    <text x="40" y="236" fill="#22c55e" font-size="14" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace" font-weight="500">$ cronux log</text>
    <text x="40" y="254" fill="#f59e0b" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">v1.1 - nueva funcionalidad</text>
    <text x="40" y="270" fill="#22c55e" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">v1.0 - Proyecto inicializado</text>
    
    <!-- Separator line -->
    <line x1="40" y1="281" x2="460" y2="281" stroke="#1e293b" stroke-width="1"/>
    
    <!-- cronux restore -->
    <text x="40" y="301" fill="#22c55e" font-size="14" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace" font-weight="500">$ cronux restore v1.0</text>
    <text x="40" y="317" fill="#22c55e" font-size="12" font-family="SF Mono, Monaco, Inconsolata, Roboto Mono, monospace">✓ Restaurado a v1.0</text>
</svg>
<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background grid -->
    <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#333" stroke-width="0.5"/>
        </pattern>
    </defs>
    <rect width="400" height="300" fill="url(#grid)" opacity="0.3"/>
    
    <!-- Version control timeline -->
    <line x1="80" y1="150" x2="320" y2="150" stroke="#6366f1" stroke-width="3"/>
    
    <!-- Version nodes -->
    <circle cx="100" cy="150" r="12" fill="#10b981"/>
    <circle cx="160" cy="150" r="12" fill="#f59e0b"/>
    <circle cx="220" cy="150" r="12" fill="#ef4444"/>
    <circle cx="280" cy="150" r="12" fill="#6366f1"/>
    
    <!-- Version labels -->
    <text x="100" y="135" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">v1.0</text>
    <text x="160" y="135" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">v1.5</text>
    <text x="220" y="135" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">v2.0</text>
    <text x="280" y="135" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">v2.1</text>
    
    <!-- Command examples below timeline -->
    <text x="100" y="170" text-anchor="middle" fill="#64748b" font-size="6" font-family="monospace">cronux new</text>
    <text x="160" y="170" text-anchor="middle" fill="#64748b" font-size="6" font-family="monospace">cronux save</text>
    <text x="220" y="170" text-anchor="middle" fill="#64748b" font-size="6" font-family="monospace">cronux variant</text>
    <text x="280" y="170" text-anchor="middle" fill="#64748b" font-size="6" font-family="monospace">cronux restore</text>
    
    <!-- File representations -->
    <rect x="70" y="180" width="60" height="40" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <rect x="75" y="185" width="50" height="4" rx="2" fill="#10b981"/>
    <rect x="75" y="192" width="35" height="3" rx="1" fill="#374151"/>
    <rect x="75" y="198" width="40" height="3" rx="1" fill="#374151"/>
    <rect x="75" y="204" width="30" height="3" rx="1" fill="#374151"/>
    <rect x="75" y="210" width="45" height="3" rx="1" fill="#374151"/>
    
    <rect x="250" y="180" width="60" height="40" rx="4" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
    <rect x="255" y="185" width="50" height="4" rx="2" fill="#6366f1"/>
    <rect x="255" y="192" width="35" height="3" rx="1" fill="#374151"/>
    <rect x="255" y="198" width="40" height="3" rx="1" fill="#374151"/>
    <rect x="255" y="204" width="30" height="3" rx="1" fill="#374151"/>
    <rect x="255" y="210" width="45" height="3" rx="1" fill="#374151"/>
    
    <!-- Connection lines -->
    <path d="M130 90 Q140 90 150 95" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M250 95 Q260 90 270 90" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
</svg>